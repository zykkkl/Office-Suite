# 测试自动分页功能
version: "4.0"
type: presentation
theme: default

styles:
  heading:
    font:
      family: "Microsoft YaHei UI"
      size: 36
      weight: 700
      color: "#1E3A5F"
  body:
    font:
      family: "Microsoft YaHei UI"
      size: 18
      weight: 400
      color: "#334155"
  accent:
    font:
      family: "Microsoft YaHei UI"
      size: 20
      weight: 600
      color: "#2563EB"

slides:
  # 测试页面：大量内容，应该触发自动分页
  - layout: stack
    background:
      color: "#FFFFFF"
      spacing: 5
      padding_top: 15
      padding_left: 30
      content_width: 194
    elements:
      - type: text
        content: "这是一个分页测试"
        style: heading

      - type: shape
        shape_type: rectangle
        size: { width: 30mm, height: 2mm }
        style:
          fill:
            color: "#2563EB"

      - type: text
        content: "第一章：介绍"
        style: accent

      - type: text
        content: "这是第一章的内容，包含一些介绍性的文字。这些文字会自动排列在幻灯片上，不需要手动指定位置。"
        style: body

      - type: text
        content: "• 第一个要点：布局系统会自动计算每个元素的位置"
        style: body

      - type: text
        content: "• 第二个要点：当内容超出页面高度时，会自动创建新的幻灯片"
        style: body

      - type: text
        content: "• 第三个要点：分页会在语义连贯的位置进行，不会打断列表"
        style: body

      - type: text
        content: "• 第四个要点：支持标题、正文、列表等多种元素类型"
        style: body

      - type: text
        content: "• 第五个要点：每行文字的高度会根据字号自动计算"
        style: body

      - type: text
        content: "• 第六个要点：中文字符和英文字符的宽度估算不同"
        style: body

      - type: text
        content: "第二章：详细说明"
        style: accent

      - type: text
        content: "这是第二章的内容，继续详细介绍功能。这些内容应该会在新的幻灯片上显示，因为第一页已经装不下了。"
        style: body

      - type: text
        content: "• 第二章要点一：分页功能会保持语义连贯"
        style: body

      - type: text
        content: "• 第二章要点二：标题后面的内容会尽量在一起"
        style: body

      - type: text
        content: "• 第二章要点三：列表项之间不会断开"
        style: body

      - type: text
        content: "• 第二章要点四：分隔线前后是良好的分页点"
        style: body

      - type: text
        content: "• 第二章要点五：如果内容仍然超出，会继续分页"
        style: body

      - type: text
        content: "第三章：总结"
        style: accent

      - type: text
        content: "这是第三章的内容，总结整个文档。自动分页功能使得内容管理更加方便，用户只需要关注内容本身，不需要担心布局问题。"
        style: body

      - type: text
        content: "• 总结要点一：自动分页减少了手动调整的工作量"
        style: body

      - type: text
        content: "• 总结要点二：语义分页保持了内容的连贯性"
        style: body

      - type: text
        content: "• 总结要点三：高度估算算法确保了分页的准确性"
        style: body
