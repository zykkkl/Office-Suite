# 世界读书日 PPT
version: "4.0"
type: presentation
theme: default

styles:
  title:
    font:
      family: "Microsoft YaHei UI"
      size: 48
      weight: 700
      color: "#1E3A5F"
  subtitle:
    font:
      family: "Microsoft YaHei UI"
      size: 24
      weight: 400
      color: "#4A6FA5"
  heading:
    font:
      family: "Microsoft YaHei UI"
      size: 36
      weight: 700
      color: "#1E3A5F"
  body:
    font:
      family: "Microsoft YaHei UI"
      size: 18
      weight: 400
      color: "#334155"
  accent:
    font:
      family: "Microsoft YaHei UI"
      size: 20
      weight: 600
      color: "#2563EB"
  quote:
    font:
      family: "KaiTi"
      size: 22
      weight: 400
      color: "#6B7280"
      italic: true

slides:
  # 第1页：封面（绝对定位，居中布局不适合 stack）
  - layout: blank
    background:
      gradient:
        type: linear
        angle: 135
        stops: ["#1E3A5F", "#2D5F8A"]
    elements:
      - type: shape
        shape_type: rectangle
        position:
          x: 0mm
          y: 0mm
          width: 254mm
          height: 143mm
        fill:
          color: "#FFFFFF"
          opacity: 0.05

      - type: text
        content: "4月23日"
        position:
          x: 30mm
          y: 30mm
          width: 194mm
          height: 15mm
          center: true
        style:
          font:
            family: "Microsoft YaHei UI"
            size: 20
            weight: 400
            color: "#B0C4DE"

      - type: text
        content: "世界读书日"
        style: title
        position:
          x: 30mm
          y: 50mm
          width: 194mm
          height: 25mm
          center: true

      - type: shape
        shape_type: rectangle
        position:
          x: 100mm
          y: 80mm
          width: 54mm
          height: 2mm
        fill:
          color: "#B0C4DE"

      - type: text
        content: "World Book Day"
        position:
          x: 30mm
          y: 88mm
          width: 194mm
          height: 15mm
          center: true
        style:
          font:
            family: "Arial"
            size: 24
            weight: 300
            color: "#B0C4DE"

      - type: text
        content: "阅读，让世界触手可及"
        position:
          x: 30mm
          y: 110mm
          width: 194mm
          height: 12mm
          center: true
        style:
          font:
            family: "Microsoft YaHei UI"
            size: 18
            weight: 400
            color: "#87CEEB"

  # 第2页：目录 — 使用 stack 布局，不需要写 y 坐标
  - layout: stack
    background:
      color: "#F8FAFC"
      spacing: 5
      padding_top: 20
      padding_left: 40
      content_width: 170
    elements:
      - type: text
        content: "目录"
        style: heading

      - type: shape
        shape_type: rectangle
        size: { width: 30mm, height: 2mm }
        style:
          fill:
            color: "#2563EB"

      - type: text
        content: "01  节日起源"
        style: body

      - type: text
        content: "02  为什么要读书"
        style: body

      - type: text
        content: "03  读书的益处"
        style: body

      - type: text
        content: "04  如何培养阅读习惯"
        style: body

      - type: text
        content: "05  名人与书"
        style: body

      - type: text
        content: "06  让阅读成为习惯"
        style: body

  # 第3页：节日起源 — 使用 stack 布局
  - layout: stack
    background:
      color: "#FFFFFF"
      spacing: 5
      padding_top: 15
      padding_left: 30
      content_width: 194
    elements:
      - type: text
        content: "01"
        style:
          font:
            family: "Arial"
            size: 48
            weight: 700
            color: "#E2E8F0"

      - type: text
        content: "节日起源"
        style: heading

      - type: shape
        shape_type: rectangle
        size: { width: 30mm, height: 2mm }
        style:
          fill:
            color: "#2563EB"

      - type: text
        content: "世界读书日的全称是「世界图书与版权日」，又称「世界图书日」。"
        style: body

      - type: text
        content: "1995年，联合国教科文组织宣布4月23日为「世界读书日」，致力于向全世界推广阅读、出版和知识产权保护。"
        style: body

      - type: text
        content: "选择4月23日的原因："
        style: accent

      - type: text
        content: "• 西班牙加泰罗尼亚地区的「圣乔治节」传统"
        style: body

      - type: text
        content: "• 塞万提斯、莎士比亚等文学巨匠的纪念日"
        style: body

  # 第4页：为什么要读书（卡片布局需要绝对定位）
  - layout: blank
    background:
      color: "#FFFFFF"
    elements:
      - type: text
        content: "02"
        position:
          x: 30mm
          y: 15mm
          width: 30mm
          height: 20mm
        style:
          font:
            family: "Arial"
            size: 48
            weight: 700
            color: "#E2E8F0"

      - type: text
        content: "为什么要读书"
        style: heading
        position:
          x: 30mm
          y: 38mm
          width: 194mm
          height: 15mm

      - type: shape
        shape_type: rectangle
        position:
          x: 30mm
          y: 55mm
          width: 30mm
          height: 2mm
        fill:
          color: "#2563EB"

      - type: shape
        shape_type: rounded_rectangle
        content: "开拓视野\n丰富知识"
        position:
          x: 25mm
          y: 65mm
          width: 60mm
          height: 40mm
        style:
          fill:
            color: "#EFF6FF"
          font:
            family: "Microsoft YaHei UI"
            size: 14
            weight: 600
            color: "#2563EB"

      - type: shape
        shape_type: rounded_rectangle
        content: "提升思维\n增强能力"
        position:
          x: 97mm
          y: 65mm
          width: 60mm
          height: 40mm
        style:
          fill:
            color: "#F0FDF4"
          font:
            family: "Microsoft YaHei UI"
            size: 14
            weight: 600
            color: "#16A34A"

      - type: shape
        shape_type: rounded_rectangle
        content: "陶冶情操\n滋养心灵"
        position:
          x: 169mm
          y: 65mm
          width: 60mm
          height: 40mm
        style:
          fill:
            color: "#FFF7ED"
          font:
            family: "Microsoft YaHei UI"
            size: 14
            weight: 600
            color: "#EA580C"

      - type: text
        content: "书籍是人类进步的阶梯，是智慧的源泉。"
        style: body
        position:
          x: 30mm
          y: 112mm
          width: 194mm
          height: 10mm

      - type: text
        content: "在信息爆炸的时代，深度阅读帮助我们建立系统化的知识体系，培养独立思考的能力。"
        style: body
        position:
          x: 30mm
          y: 124mm
          width: 194mm
          height: 10mm

  # 第5页：读书的益处 — 使用 stack 布局
  - layout: stack
    background:
      color: "#FFFFFF"
      spacing: 3
      padding_top: 12
      padding_left: 30
      content_width: 194
    elements:
      - type: text
        content: "03"
        style:
          font:
            family: "Arial"
            size: 48
            weight: 700
            color: "#E2E8F0"

      - type: text
        content: "读书的益处"
        style: heading

      - type: shape
        shape_type: rectangle
        size: { width: 30mm, height: 2mm }
        style:
          fill:
            color: "#2563EB"

      - type: text
        content: "个人成长"
        style: accent

      - type: text
        content: "• 提高语言表达和写作能力"
        style: body

      - type: text
        content: "• 增强逻辑思维和分析能力"
        style: body

      - type: text
        content: "• 激发创造力和想象力"
        style: body

      - type: text
        content: "身心健康"
        style: accent

      - type: text
        content: "• 降低压力，缓解焦虑情绪"
        style: body

      - type: text
        content: "• 延缓认知衰退，预防老年痴呆"
        style: body

  # 第6页：如何培养阅读习惯（表格需要绝对定位）
  - layout: blank
    background:
      color: "#FFFFFF"
    elements:
      - type: text
        content: "04"
        position:
          x: 30mm
          y: 15mm
          width: 30mm
          height: 20mm
        style:
          font:
            family: "Arial"
            size: 48
            weight: 700
            color: "#E2E8F0"

      - type: text
        content: "如何培养阅读习惯"
        style: heading
        position:
          x: 30mm
          y: 38mm
          width: 194mm
          height: 15mm

      - type: shape
        shape_type: rectangle
        position:
          x: 30mm
          y: 55mm
          width: 30mm
          height: 2mm
        fill:
          color: "#2563EB"

      - type: table
        position:
          x: 30mm
          y: 65mm
          width: 194mm
          height: 65mm
        rows: 5
        cols: 2
        data:
          - ["方法", "具体建议"]
          - ["设定目标", "每月读完一本书，每天阅读30分钟"]
          - ["固定时间", "利用通勤、睡前等碎片时间"]
          - ["营造环境", "打造专属阅读角，远离手机干扰"]
          - ["加入社群", "参与读书会，分享阅读心得"]

  # 第7页：名人与书 — 使用 stack 布局
  - layout: stack
    background:
      color: "#FFFFFF"
      spacing: 3
      padding_top: 15
      padding_left: 30
      content_width: 194
    elements:
      - type: text
        content: "05"
        style:
          font:
            family: "Arial"
            size: 48
            weight: 700
            color: "#E2E8F0"

      - type: text
        content: "名人与书"
        style: heading

      - type: shape
        shape_type: rectangle
        size: { width: 30mm, height: 2mm }
        style:
          fill:
            color: "#2563EB"

      - type: text
        content: "「读书破万卷，下笔如有神。」"
        style: quote
        extra:
          center: true

      - type: text
        content: "—— 杜甫"
        style: body
        extra:
          center: true

      - type: text
        content: "「书是人类进步的阶梯。」"
        style: quote
        extra:
          center: true

      - type: text
        content: "—— 高尔基"
        style: body
        extra:
          center: true

      - type: text
        content: "「读一本好书，就是和许多高尚的人谈话。」"
        style: quote
        extra:
          center: true

      - type: text
        content: "—— 笛卡尔"
        style: body
        extra:
          center: true

  # 第8页：让阅读成为习惯 — 使用 stack 布局
  - layout: stack
    background:
      gradient:
        type: linear
        angle: 135
        stops: ["#1E3A5F", "#2D5F8A"]
      spacing: 4
      padding_top: 15
      padding_left: 50
      content_width: 154
    elements:
      - type: text
        content: "06"
        style:
          font:
            family: "Arial"
            size: 48
            weight: 700
            color: "#FFFFFF"
            opacity: 0.3

      - type: text
        content: "让阅读成为习惯"
        extra:
          center: true
        style:
          font:
            family: "Microsoft YaHei UI"
            size: 36
            weight: 700
            color: "#FFFFFF"

      - type: shape
        shape_type: rectangle
        size: { width: 54mm, height: 2mm }
        style:
          fill:
            color: "#B0C4DE"

      - type: text
        content: "今天是世界读书日，让我们一起："
        extra:
          center: true
        style:
          font:
            family: "Microsoft YaHei UI"
            size: 20
            weight: 400
            color: "#B0C4DE"

      - type: text
        content: "• 放下手机，拿起书本"
        style:
          font:
            family: "Microsoft YaHei UI"
            size: 20
            weight: 400
            color: "#FFFFFF"

      - type: text
        content: "• 享受阅读的乐趣"
        style:
          font:
            family: "Microsoft YaHei UI"
            size: 20
            weight: 400
            color: "#FFFFFF"

      - type: text
        content: "• 让知识照亮人生"
        style:
          font:
            family: "Microsoft YaHei UI"
            size: 20
            weight: 400
            color: "#FFFFFF"

      - type: text
        content: "世界读书日快乐！"
        extra:
          center: true
        style:
          font:
            family: "Microsoft YaHei UI"
            size: 24
            weight: 700
            color: "#FFD700"
